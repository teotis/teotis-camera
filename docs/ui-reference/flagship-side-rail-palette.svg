    <path d="M339 452 l5-16 l5 16 h-6 l2-7" fill="none" stroke="#EAF4F6" stroke-width="2" stroke-linejoin="round"/>
    <rect x="330" y="480" width="28" height="18" rx="9" fill="#102028" stroke="#1ADBC7" stroke-opacity="0.55"/>
    <text x="344" y="493" text-anchor="middle" fill="#7CF7EC" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700">DEV</text>
