<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">OpenCamera Flagship Side Rail + Palette Reference</title>
  <desc id="desc">A phone camera UI mockup with a full preview, right side rail controls, bottom capture deck, and palette panel.</desc>
  <defs>
    <linearGradient id="preview" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C2731"/>
      <stop offset="0.38" stop-color="#283B44"/>
      <stop offset="0.72" stop-color="#435246"/>
      <stop offset="1" stop-color="#101418"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8CBAC5" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#1D2B32" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121820" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#06080B" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="palette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D2C1A7"/>
      <stop offset="0.33" stop-color="#62B7AD"/>
      <stop offset="0.66" stop-color="#7E8CCB"/>
      <stop offset="1" stop-color="#E1805F"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="390" height="844" rx="34" fill="#05070A"/>
  <rect x="8" y="8" width="374" height="828" rx="30" fill="url(#preview)"/>
  <rect x="8" y="8" width="374" height="300" rx="30" fill="url(#sky)"/>

  <path d="M8 520 C72 470 114 492 154 430 C191 373 233 402 268 344 C306 280 338 310 382 250 L382 836 L8 836 Z" fill="#111A18" opacity="0.72"/>
  <path d="M8 620 C70 586 120 608 168 560 C220 508 266 548 326 492 C348 472 365 458 382 448 L382 836 L8 836 Z" fill="#080B0E" opacity="0.72"/>

  <rect x="0" y="0" width="390" height="152" fill="#000000" opacity="0.28"/>
  <rect x="0" y="626" width="390" height="218" fill="url(#bottomGlass)"/>

  <g font-family="Inter, Arial, sans-serif">
